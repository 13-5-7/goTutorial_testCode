<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
    </style>
    <title>{{.Title}} | Knowledge Base</title>
</head>
<body class="bg-[#0f172a] text-slate-200 antialiased min-h-screen">
    <div class="max-w-4xl mx-auto pt-16 px-6">
        <header class="flex items-baseline justify-between mb-12 border-b border-slate-700 pb-6">
            <div class="flex items-center gap-3">
                <span class="w-3 h-8 bg-indigo-500 rounded-full"></span>
                <h1 class="text-4xl font-bold tracking-tight text-white">{{.Title}}</h1>
            </div>
            <a href="/edit/{{.Title}}" class="group flex items-center gap-2 text-sm font-semibold text-slate-400 hover:text-indigo-400 transition-colors">
                <span class="border border-slate-600 px-3 py-1 rounded group-hover:border-indigo-500 transition-all">EDIT</span>
            </a>
        </header>

        <main class="bg-[#1e293b] rounded-2xl p-10 shadow-2xl border border-slate-700/50">
            <article class="prose prose-invert max-w-none leading-relaxed text-slate-300">
                <textarea name="body" spellcheck="false" class="relative w-full h-[60vh] bg-[#1e293b] border border-slate-700 rounded-xl p-8 code-font text-indigo-100 leading-relaxed focus:outline-none focus:border-indigo-500 transition-all resize-none shadow-inner" placeholder="Enter your markdown here...">{{printf "%s" .Body}}</textarea>
            </article>
        </main>

        <footer class="mt-8 text-center text-slate-500 text-xs tracking-widest uppercase">
            System: Go 1.26 + Docker | UI: Tailwind CSS
        </footer>
    </div>
</body>
</html>
